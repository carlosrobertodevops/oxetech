<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold">Gerenciador de Tarefas</h1>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 flex flex-col gap-6 mt-4">
        <section class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">Nova Tarefa</h2>
            <form id="task-form" class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="task-input" placeholder="O que precisa ser feito?" class="flex-grow border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition font-medium">Adicionar</button>
            </form>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md flex-grow">
            <h2 class="text-xl font-semibold mb-4">Minhas Tarefas</h2>
            <ul id="task-list" class="space-y-3">
                <li class="text-gray-500 italic">Nenhuma tarefa adicionada ainda.</li>
            </ul>
        </section>
    </main>

    <footer class="bg-gray-800 text-gray-300 text-center p-4 mt-auto">
        <div class="container mx-auto">
            <p>&copy; 2026 Oxetech. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
